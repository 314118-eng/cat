<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D 健保卡 SVG 動畫</title>
<style>
  * {
    box-sizing: border-box;
  }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle at center, #f0f4f8 0%, #d9e2ec 100%);
    font-family: 'PingFang TC', 'Heiti TC', 'Microsoft JhengHei', sans-serif;
    overflow: hidden;
  }

  /* 提示文字 */
  .prompt-text {
    margin-bottom: 40px;
    font-size: 22px;
    font-weight: bold;
    color: #334e68;
    background: rgba(255, 255, 255, 0.8);
    padding: 12px 24px;
    border-radius: 30px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    display: flex;
    align-items: center;
    gap: 10px;
    animation: bounce 2s infinite;
  }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  /* 3D 卡片容器 */
  .card-container {
    perspective: 1500px; /* 定義 3D 深度 */
    width: 600px;
    height: 380px;
    cursor: pointer;
  }

  /* 卡片本體 */
  .card {
    width: 100%;
    height: 100%;
    position: relative;
    /* 平滑的翻轉過場動畫 */
    transition: transform 0.8s cubic-bezier(0.4, 0.2, 0.2, 1);
    transform-style: preserve-3d;
    box-shadow: 0 20px 40px rgba(0,0,0,0.2), 0 5px 10px rgba(0,0,0,0.1);
    border-radius: 20px;
  }

  /* 滑鼠懸停時觸發 180 度翻轉 */
  .card-container:hover .card {
    transform: rotateY(180deg);
    box-shadow: -20px 20px 40px rgba(0,0,0,0.2), -5px 5px 10px rgba(0,0,0,0.1);
  }

  /* 正反面共用設定 */
  .card-face {
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden; /* 隱藏背面 */
    border-radius: 20px;
    overflow: hidden;
    background-color: #fff;
  }

  /* 背面需要預先翻轉 180 度 */
  .card-back {
    transform: rotateY(180deg);
  }

  /* 醒目框框動畫 (呼吸燈與虛線滾動效果) */
  @keyframes pulse-border {
    0% { 
      stroke: #ff3b30; 
      filter: drop-shadow(0 0 4px rgba(255,59,48,0.6)); 
    }
    50% { 
      stroke: #ff8c00; 
      filter: drop-shadow(0 0 12px rgba(255,140,0,0.9)); 
    }
    100% { 
      stroke: #ff3b30; 
      filter: drop-shadow(0 0 4px rgba(255,59,48,0.6)); 
    }
  }
  @keyframes dash-move {
    to { stroke-dashoffset: -20; }
  }
  
  .highlight-box {
    fill: rgba(255, 235, 59, 0.15); /* 輕微的黃色底色 */
    stroke-width: 4;
    stroke-dasharray: 10 5;
    animation: pulse-border 1.5s infinite, dash-move 1s linear infinite;
  }
</style>
</head>
<body>

  <div class="prompt-text">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6"/><path d="M9 21H3v-6"/><path d="M21 3l-7 7"/><path d="M3 21l7-7"/></svg>
    請將滑鼠移至卡片上方以翻轉至背面
  </div>

  <div class="card-container">
    <div class="card">
      
      <!-- ==================== 卡片正面 ==================== -->
      <div class="card-face card-front">
        <svg width="100%" height="100%" viewBox="0 0 600 380">
          <defs>
            <!-- 正面漸層背景 -->
            <linearGradient id="front-bg" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#e8f5e9" />
              <stop offset="50%" stop-color="#c8e6c9" />
              <stop offset="100%" stop-color="#a5d6a7" />
            </linearGradient>
            <!-- 晶片漸層 -->
            <linearGradient id="chip-grad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#fdd835" />
              <stop offset="50%" stop-color="#fbc02d" />
              <stop offset="100%" stop-color="#f9a825" />
            </linearGradient>
            <!-- 背景波浪紋路 (增加真實感) -->
            <pattern id="waves" x="0" y="0" width="120" height="40" patternUnits="userSpaceOnUse">
              <path d="M0 20 Q 30 0, 60 20 T 120 20" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
              <path d="M0 40 Q 30 20, 60 40 T 120 40" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
            </pattern>
            <!-- 照片剪裁路徑 (新增) -->
            <clipPath id="photo-clip">
              <rect width="130" height="170" rx="6" />
            </clipPath>
          </defs>

          <!-- 渲染背景 -->
          <rect width="600" height="380" fill="url(#front-bg)" />
          <rect width="600" height="380" fill="url(#waves)" />

          <!-- 左上角 Logo 與標題 -->
          <g transform="translate(40, 35)">
            <!-- 模擬健保局 Logo -->
            <circle cx="22" cy="22" r="22" fill="#2e7d32"/>
            <path d="M 12 22 L 32 22 M 22 12 L 22 32" stroke="#fff" stroke-width="6" stroke-linecap="round"/>
            <path d="M 10 32 Q 22 40 34 32" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
            
            <text x="65" y="28" font-size="28" font-weight="900" fill="#1b5e20" letter-spacing="4">全民健康保險</text>
            <text x="65" y="48" font-size="14" font-weight="bold" fill="#388e3c" letter-spacing="1">NATIONAL HEALTH INSURANCE</text>
          </g>

          <!-- 金色晶片 -->
          <g transform="translate(50, 140)">
            <rect width="75" height="60" rx="8" fill="url(#chip-grad)" stroke="#cda434" stroke-width="1.5"/>
            <!-- 晶片內部紋路 -->
            <path d="M 20 0 v 60 M 55 0 v 60 M 0 20 h 20 M 55 20 h 20 M 0 40 h 20 M 55 40 h 20" stroke="#cda434" stroke-width="2" fill="none"/>
            <circle cx="37.5" cy="30" r="12" stroke="#cda434" stroke-width="2" fill="none"/>
          </g>

          <!-- 個人資訊文字區 (縮減間距避免遮擋照片) -->
          <g transform="translate(140, 160)" font-size="20" font-weight="bold" fill="#333">
            <text y="0">姓<tspan fill="none">一</tspan>名：<tspan fill="#000" font-size="26" font-family="sans-serif">劉 釋 文</tspan></text>
            <text y="45">身分證號：<tspan fill="#000" font-size="24" font-family="sans-serif" letter-spacing="2">A123456789</tspan></text>
            <text y="90">出生日期：<tspan fill="#000" font-size="22" font-family="sans-serif" letter-spacing="2">080 / 01 / 01</tspan></text>
          </g>

          <!-- 右側照片區塊 (已更換新圖片) -->
          <g transform="translate(420, 100)">
            <!-- 照片底框 -->
            <rect width="130" height="170" fill="#e0e0e0" rx="6" stroke="#bdbdbd" stroke-width="2"/>
            <!-- 真實照片 (使用外部連結範例，並應用剪裁使照片適應圓角框) -->
            <image href="https://images.unsplash.com/photo-1514888286974-6c03e2ca1dba?ixlib=rb-4.0.3&auto=format&fit=crop&w=300&q=80" 
                   x="0" y="0" width="130" height="170" preserveAspectRatio="xMidYMid slice" clip-path="url(#photo-clip)"/>
          </g>

          <!-- 底部小字 -->
          <text x="50" y="340" font-size="18" font-weight="bold" fill="#1b5e20" letter-spacing="2">健 保 卡</text>
        </svg>
      </div>

      <!-- ==================== 卡片背面 ==================== -->
      <div class="card-face card-back">
        <svg width="100%" height="100%" viewBox="0 0 600 380">
          <defs>
            <linearGradient id="back-bg" x1="0%" y1="0%" x2="0%" y2="100%">
              <stop offset="0%" stop-color="#ffffff" />
              <stop offset="100%" stop-color="#f5f5f5" />
            </linearGradient>
          </defs>
          
          <rect width="600" height="380" fill="url(#back-bg)" stroke="#e0e0e0" stroke-width="1"/>

          <!-- 頂部色帶 (裝飾用) -->
          <rect x="0" y="20" width="600" height="15" fill="#81c784" opacity="0.5"/>

          <!-- 注意事項文字 -->
          <g transform="translate(40, 80)" font-size="15" fill="#555">
            <text y="0" font-weight="900" fill="#333" font-size="18">注意事項：</text>
            <text y="30">1. 本卡僅限本人使用，不得轉借他人，違者依法辦理。</text>
            <text y="55">2. 就醫時請務必攜帶本卡及身分證明文件，以供核對。</text>
            <text y="80">3. 拾獲本卡請交至各全民健保分區業務組或就近之警察機關。</text>
            <text y="105">4. 若有遺失或毀損，請儘速申請補發。</text>
          </g>

          <!-- ================= 號碼區塊與醒目標示 ================= -->
          <g transform="translate(40, 220)">
            <text x="10" y="22" font-size="18" font-weight="bold" fill="#333">卡 號：</text>
            <text x="85" y="24" font-size="26" font-weight="bold" fill="#000" letter-spacing="3" font-family="monospace">0000 1234 5678</text>

            <!-- 號碼動態高亮紅框 -->
            <rect class="highlight-box" x="75" y="-5" width="270" height="40" rx="6" />
            <!-- 標籤小提示 -->
            <rect x="75" y="-28" width="70" height="23" fill="#ff3b30" rx="4"/>
            <text x="80" y="-12" font-size="12" font-weight="bold" fill="#fff">號碼標示</text>
          </g>

          <!-- ================= 條碼區塊與醒目標示 ================= -->
          <g transform="translate(40, 280)">
            <!-- 使用 SVG stroke-dasharray 快速繪製逼真的條碼 -->
            <line x1="15" y1="35" x2="335" y2="35" stroke="#000" stroke-width="50" 
                  stroke-dasharray="4 2 6 2 2 3 8 2 1 3 4 2 6 2 2 4 5 2 1 3 8 2 2 3 4 2 5 2 1 3 7 2 2 4 6 2 3 2 5 2 2 3 7" />
            
            <!-- 條碼下方的數字 -->
            <text x="175" y="75" font-size="14" font-family="monospace" letter-spacing="8" text-anchor="middle">A12345678900</text>

            <!-- 條碼動態高亮紅框 -->
            <rect class="highlight-box" x="5" y="5" width="340" height="80" rx="6" />
            <!-- 標籤小提示 -->
            <rect x="5" y="-18" width="70" height="23" fill="#ff3b30" rx="4"/>
            <text x="10" y="-2" font-size="12" font-weight="bold" fill="#fff">條碼標示</text>
          </g>
          
          <!-- 發卡單位 -->
          <text x="560" y="350" font-size="14" font-weight="bold" fill="#888" text-anchor="end">衛生福利部中央健康保險署 製</text>

        </svg>
      </div>

    </div>
  </div>

</body>
</html>
